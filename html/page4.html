<!DOCTYPE html>
<html lang= "vi">
<head>
	<title>Hóa Đơn Thanh Toán</title>
	<meta charset="utf-8">
	<style>
		table, tr, th, td {
			border: 2px solid rgb(255, 0, 0);
		}
		table {
			width: 75%;
		}
	</style>
</head>
<body>
	<h3>Hóa đơn thanh toán.</h3>
	<table> 
		<tbody>
			<tr>
				<th>STT</th>
				<th>Tên sản phẩm</th>
				<th>Đơn giá</th>
				<th>Số lượng</th>
				<th>Đơn vị tính</th>
				<th>Thành tiền</th>
			</tr>
			<tr>
				<td>1</td>
				<td>Mì Ly</td>
				<td class="dongia">8000</td>
				<td class="soluong">3</td>
				<td>VND</td>
				<td class ="thanhtien"></td>
			</tr>
			<tr>
				<td>2</td>
				<td>Chai Nước C2</td>
				<td class="dongia">12000</td>
				<td class="soluong">1</td>
				<td>VND</td>
				<td class ="thanhtien"></td>
			</tr>
			<tr>
				<td>3</td>
				<td>Rau</td>
				<td class="dongia">5000</td>
				<td class="soluong">2</td>
				<td>VND</td>
				<td class ="thanhtien"></td>
			</tr>
			<tr>
				<td>4</td>
				<td>Nước RedBlue</td>
				<td class="dongia">11000</td>
				<td class="soluong">2</td>
				<td>VND</td>
				<td class ="thanhtien"></td>
			</tr>
			<tr>
				<td>5</td>
				<td>Muối ớt</td>
				<td class="dongia">10000</td>
				<td class="soluong">1</td>
				<td>VND</td>
				<td class ="thanhtien"></td>
			</tr>
			<tr>
				<td colspan="5">Tổng thanh toán:</td>
				<td id="tong"></td>
			</tr>
		</tbody>
	</table>

	<script src="../js/hoadon.js">
		
	</script>
		
</body>
</html>
